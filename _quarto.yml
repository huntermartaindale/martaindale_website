project:
  type: website
  output-dir: _site
  render:
    - "index.qmd"
    - "research.qmd"
    - "cv.qmd"
    - "contact.qmd"
  resources:
    - CNAME
    - cv/

website:
  title: "Hunter Martaindale"
  description: "Director of Research, ALERRT Center | Texas State University"
  favicon: img/favicon.ico
  navbar:
    background: light
    left:
      - text: "Research"
        href: research.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/huntermartaindale
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/hmartaindale/
        aria-label: LinkedIn
  page-footer:
    center: "Hunter Martaindale | Texas State University"
    right:
      - text: "Google Scholar"
        href: https://scholar.google.com/citations?user=_7PlqKYAAAAJ
      - text: "ORCID"
        href: https://orcid.org/0000-0002-8100-7698

format:
  html:
    theme: [cosmo, styles.scss]
    toc: false
    link-external-newwindow: true
    link-external-icon: false

execute:
  freeze: auto
  echo: false
  warning: false
  message: false
