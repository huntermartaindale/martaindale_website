# Build huntermartaindale.com (Quarto + R) and deploy to GitHub Pages.
#
# Pulls the private CV from huntermartaindale/cv via a read-only deploy key
# (secret: CV_DEPLOY_KEY) and renders it into _site/cv/ before publishing.
#
# DNS for huntermartaindale.com (one-time, at registrar):
#   A     @   185.199.108.153
#   A     @   185.199.109.153
#   A     @   185.199.110.153
#   A     @   185.199.111.153
#   CNAME www huntermartaindale.github.io.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'      # Mondays 7am UTC: refresh Scholar stats
  workflow_dispatch:           # Manual trigger from Actions UI

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out website repository
        uses: actions/checkout@v4

      - name: Check out private CV repository
        uses: actions/checkout@v4
        with:
          repository: huntermartaindale/cv
          ssh-key: ${{ secrets.CV_DEPLOY_KEY }}
          path: cv-source

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX (for CV PDF rendering)
        uses: r-lib/actions/setup-tinytex@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: install.packages(c("scholar", "yaml", "htmltools", "dplyr", "purrr", "stringr", "knitr", "rmarkdown"))
        shell: Rscript {0}

      - name: Refresh Google Scholar stats (website)
        run: Rscript data/update_scholar.R

      - name: Commit updated Scholar stats if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scholar_stats.yaml
          git diff --staged --quiet || git commit -m "chore: update scholar stats [skip ci]"
          git push || true

      - name: Render CV (HTML + PDF)
        working-directory: cv-source
        run: quarto render

      - name: Sync publications from cv_data.yaml
        run: Rscript scripts/sync_publications.R cv-source/cv_data.yaml

      - name: Render website
        run: quarto render

      - name: Place CV outputs into site
        run: |
          mkdir -p _site/cv
          cp cv-source/cv.html _site/cv/index.html
          cp cv-source/cv.pdf  _site/cv/martaindale_cv.pdf

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: huntermartaindale.com
